<div class="container">
  <div class="footer-content">
    <div class="footer-logo">XEarthLayer</div>
    <div class="footer-links">
      <a href="{{ site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
      {{ with site.Params.discord }}<a href="{{ . }}" target="_blank" rel="noopener">Discord</a>{{ end }}
      {{ with site.Params.youtube }}<a href="{{ . }}" target="_blank" rel="noopener">YouTube</a>{{ end }}
      {{ with (site.GetPage "/news").OutputFormats.Get "rss" }}
      <a href="{{ .Permalink }}" class="footer-rss" title="Subscribe to the XEarthLayer news RSS feed">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
        RSS
      </a>
      {{ end }}
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; {{ now.Year }} XEarthLayer Contributors</p>
    <p class="made-with">Made with <span class="heart">&hearts;</span> in California</p>
  </div>
</div>
